<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoHeal</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --surface: #13171d;
        --surface-2: #1a2030;
        --line: rgba(160, 180, 210, 0.13);
        --text: #ecf2ff;
        --muted: #7a8fa8;
        --accent: #6ee7b7;
        --accent-2: #7dd3fc;
        --warn: #fbbf24;
        --bad: #fb7185;
        --user-bg: #1a3a5c;
        --agent-bg: #141a23;
        --mono: "SFMono-Regular", "Cascadia Code", "Liberation Mono", monospace;
        --sans: "Aptos", "Segoe UI", system-ui, sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(13,17,23,0.9);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      header h1 {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      header h1 span { color: var(--accent); }
      .caps-bar {
        margin-left: auto;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .cap-chip {
        font: 11px var(--mono);
        padding: 3px 9px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .cap-chip.on {
        border-color: rgba(110,231,183,0.35);
        background: rgba(110,231,183,0.08);
        color: var(--accent);
      }

      /* ── Chat area ── */
      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 28px 0;
        scroll-behavior: smooth;
      }
      .msg-row {
        display: flex;
        padding: 6px 24px;
        gap: 12px;
        max-width: 860px;
        margin: 0 auto;
        width: 100%;
      }
      .msg-row.user { justify-content: flex-end; }
      .msg-row.agent { justify-content: flex-start; }

      .bubble {
        max-width: 72%;
        border-radius: 18px;
        padding: 12px 16px;
        line-height: 1.55;
        font-size: 14px;
      }
      .user .bubble {
        background: var(--user-bg);
        border-bottom-right-radius: 4px;
        color: #c8e6ff;
      }
      .agent .bubble {
        background: var(--agent-bg);
        border: 1px solid var(--line);
        border-bottom-left-radius: 4px;
      }

      /* avatar */
      .avatar {
        width: 30px;
        height: 30px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .agent .avatar {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #061018;
      }
      .user .avatar {
        background: var(--user-bg);
        border: 1px solid rgba(125,211,252,0.3);
        color: var(--accent-2);
      }

      /* setup confirmation */
      .caps-block {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .c-chip {
        font: 11px var(--mono);
        padding: 4px 10px;
        border-radius: 999px;
      }
      .c-chip.ok {
        background: rgba(110,231,183,0.1);
        border: 1px solid rgba(110,231,183,0.3);
        color: var(--accent);
      }
      .c-chip.miss {
        background: rgba(251,191,36,0.08);
        border: 1px solid rgba(251,191,36,0.28);
        color: var(--warn);
      }

      /* investigation steps */
      .steps { margin-top: 10px; }
      .step-item {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 6px 0;
        border-top: 1px solid var(--line);
        font-size: 13px;
        color: var(--muted);
      }
      .step-item:first-child { border-top: none; }
      .step-tool {
        font: 11px var(--mono);
        color: var(--accent-2);
        white-space: nowrap;
        padding-top: 1px;
      }
      .conf-bar {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
        font: 12px var(--mono);
        color: var(--muted);
      }
      .conf-val { color: var(--accent); font-weight: 600; }

      /* elicit */
      .elicit-box {
        margin-top: 10px;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid rgba(251,191,36,0.3);
        background: rgba(251,191,36,0.05);
        font-size: 13px;
        color: #fde68a;
        line-height: 1.5;
      }
      .elicit-box strong { color: var(--warn); }

      /* final result card */
      .result-card {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        font-size: 13px;
      }
      .result-card .rc-head {
        padding: 10px 14px;
        background: rgba(255,255,255,0.03);
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .result-card .rc-head strong { font-size: 13px; }
      .result-card .rc-body { padding: 12px 14px; display: grid; gap: 10px; }
      .rc-field label {
        display: block;
        font: 10px var(--mono);
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 3px;
      }
      .rc-field p { color: var(--text); line-height: 1.5; }
      .rc-badge {
        font: 11px var(--mono);
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(110,231,183,0.1);
        border: 1px solid rgba(110,231,183,0.25);
        color: var(--accent);
      }

      /* typing indicator */
      .typing {
        display: flex;
        gap: 4px;
        padding: 4px 2px;
      }
      .typing span {
        width: 7px; height: 7px;
        border-radius: 999px;
        background: var(--muted);
        animation: bounce 1.1s infinite;
      }
      .typing span:nth-child(2) { animation-delay: 0.18s; }
      .typing span:nth-child(3) { animation-delay: 0.36s; }
      @keyframes bounce {
        0%,80%,100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-5px); opacity: 1; }
      }

      /* ── Input bar ── */
      #input-bar {
        border-top: 1px solid var(--line);
        padding: 16px 24px;
        background: rgba(13,17,23,0.9);
        backdrop-filter: blur(12px);
      }
      .input-wrap {
        max-width: 860px;
        margin: 0 auto;
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      textarea#msg {
        flex: 1;
        min-height: 44px;
        max-height: 180px;
        resize: none;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        color: var(--text);
        font: 14px/1.5 var(--sans);
        padding: 11px 14px;
        outline: none;
        overflow-y: auto;
        field-sizing: content;
      }
      textarea#msg:focus {
        border-color: rgba(110,231,183,0.45);
        box-shadow: 0 0 0 3px rgba(110,231,183,0.07);
      }
      textarea#msg::placeholder { color: var(--muted); }
      #send {
        border: 0;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #061018;
        cursor: pointer;
        font-weight: 800;
        font-size: 13px;
        padding: 11px 18px;
        white-space: nowrap;
        transition: filter 150ms, transform 150ms;
        height: 44px;
      }
      #send:hover { filter: brightness(1.08); transform: translateY(-1px); }
      #send:disabled { filter: grayscale(0.7) brightness(0.7); transform: none; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <header>
      <h1>Auto<span>Heal</span></h1>
      <div class="caps-bar" id="capsBar"></div>
    </header>

    <div id="chat"></div>

    <div id="input-bar">
      <div class="input-wrap">
        <textarea id="msg" rows="1" placeholder="Describe an issue, or paste credentials (e.g. repo: owner/name)…"></textarea>
        <button id="send">Send</button>
      </div>
    </div>

    <script>
      const chat = document.getElementById('chat');
      const msgInput = document.getElementById('msg');
      const sendBtn = document.getElementById('send');
      const capsBar = document.getElementById('capsBar');

      const ALL_CAPS = ['jaeger', 'loki', 'github', 'web_search', 'sandbox'];
      let sessionId = localStorage.getItem('autoheal_session') || null;

      // ── Capability bar ──────────────────────────────────────────────
      function updateCapsBar(configured = []) {
        capsBar.innerHTML = ALL_CAPS.map(c => `
          <span class="cap-chip ${configured.includes(c) ? 'on' : ''}">${c}</span>
        `).join('');
      }
      updateCapsBar();

      // ── DOM helpers ─────────────────────────────────────────────────
      function appendRow(role, contentEl) {
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? 'U' : 'A';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.appendChild(contentEl);

        if (role === 'user') {
          row.appendChild(bubble);
          row.appendChild(avatar);
        } else {
          row.appendChild(avatar);
          row.appendChild(bubble);
        }

        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
        return bubble;
      }

      function textEl(text) {
        const p = document.createElement('p');
        p.textContent = text;
        return p;
      }

      function typingIndicator() {
        const div = document.createElement('div');
        div.className = 'typing';
        div.innerHTML = '<span></span><span></span><span></span>';
        return div;
      }

      // ── Event renderers ─────────────────────────────────────────────
      function renderSetup(payload, bubble) {
        const p = document.createElement('p');
        p.textContent = payload.message;
        bubble.appendChild(p);

        if (payload.configured?.length || payload.unavailable?.length) {
          const bar = document.createElement('div');
          bar.className = 'caps-block';
          for (const c of payload.configured || []) {
            const chip = document.createElement('span');
            chip.className = 'c-chip ok';
            chip.textContent = '✓ ' + c;
            bar.appendChild(chip);
          }
          for (const c of payload.needs_input || []) {
            const chip = document.createElement('span');
            chip.className = 'c-chip miss';
            chip.textContent = '? ' + c;
            bar.appendChild(chip);
          }
          bubble.appendChild(bar);
        }

        if (payload.configured) updateCapsBar(payload.configured);
        if (payload.session_id) {
          sessionId = payload.session_id;
          localStorage.setItem('autoheal_session', sessionId);
        }
      }

      function renderStep(payload, stepsContainer) {
        const item = document.createElement('div');
        item.className = 'step-item';
        item.innerHTML = `
          <span class="step-tool">${payload.tool || 'step'}</span>
          <span>${payload.result_summary || ''}</span>
        `;
        stepsContainer.appendChild(item);
        chat.scrollTop = chat.scrollHeight;
      }

      function renderElicit(payload, bubble) {
        const box = document.createElement('div');
        box.className = 'elicit-box';
        box.innerHTML = payload.message.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        bubble.appendChild(box);
      }

      function renderFinal(payload, bubble) {
        const r = payload.result;
        const rc = r?.root_cause;
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <div class="rc-head">
            <strong>Investigation complete</strong>
            <span class="rc-badge">${r?.action_taken || 'explained'}</span>
          </div>
          <div class="rc-body">
            <div class="rc-field">
              <label>Issue summary</label>
              <p>${r?.issue_summary || '—'}</p>
            </div>
            <div class="rc-field">
              <label>Root cause</label>
              <p>${rc?.description || '—'}</p>
            </div>
            <div class="rc-field">
              <label>Recommended fix</label>
              <p>${r?.recommended_fix || '—'}</p>
            </div>
            <div class="rc-field">
              <label>Confidence</label>
              <p>${((rc?.confidence || 0) * 100).toFixed(0)}%
                ${rc?.error_type ? `· <span style="color:var(--muted)">${rc.error_type}</span>` : ''}
              </p>
            </div>
          </div>
        `;
        bubble.appendChild(card);

        if (payload.session_id) {
          sessionId = payload.session_id;
          localStorage.setItem('autoheal_session', sessionId);
        }
        if (r?.tools_unavailable) updateCapsBar(
          ALL_CAPS.filter(c => !r.tools_unavailable.includes(c))
        );
      }

      // ── Send ────────────────────────────────────────────────────────
      async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text) return;

        msgInput.value = '';
        msgInput.style.height = 'auto';
        sendBtn.disabled = true;

        // User bubble
        appendRow('user', textEl(text));

        // Agent bubble with typing indicator
        const typing = typingIndicator();
        const agentBubble = appendRow('agent', typing);

        // Steps container (appended once first step arrives)
        let stepsContainer = null;
        let typingRemoved = false;

        function ensureSteps() {
          if (!stepsContainer) {
            stepsContainer = document.createElement('div');
            stepsContainer.className = 'steps';
            agentBubble.appendChild(stepsContainer);
          }
          return stepsContainer;
        }

        function removeTyping() {
          if (!typingRemoved) {
            typing.remove();
            typingRemoved = true;
          }
        }

        try {
          const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, session_id: sessionId }),
          });

          if (!response.ok || !response.body) throw new Error(`HTTP ${response.status}`);

          // Grab session_id from header if present
          const headerSid = response.headers.get('X-Session-Id');
          if (headerSid) {
            sessionId = headerSid;
            localStorage.setItem('autoheal_session', sessionId);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            const chunks = buffer.split('\n\n');
            buffer = chunks.pop() || '';

            for (const chunk of chunks) {
              const line = chunk.split('\n').find(l => l.startsWith('data: '));
              if (!line) continue;
              const payload = JSON.parse(line.slice(6));

              removeTyping();

              if (payload.type === 'setup') {
                renderSetup(payload, agentBubble);
              } else if (payload.type === 'step') {
                renderStep(payload, ensureSteps());
              } else if (payload.type === 'elicit') {
                renderElicit(payload, agentBubble);
              } else if (payload.type === 'final') {
                renderFinal(payload, agentBubble);
              } else if (payload.type === 'error') {
                const p = document.createElement('p');
                p.style.color = 'var(--bad)';
                p.textContent = payload.message || 'Unknown error';
                agentBubble.appendChild(p);
              }
            }
          }
        } catch (err) {
          removeTyping();
          const p = document.createElement('p');
          p.style.color = 'var(--bad)';
          p.textContent = String(err);
          agentBubble.appendChild(p);
        } finally {
          removeTyping();
          sendBtn.disabled = false;
          msgInput.focus();
          chat.scrollTop = chat.scrollHeight;
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      msgInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Welcome message on load
      (function greet() {
        const content = document.createElement('p');
        content.textContent = sessionId
          ? 'Session restored. Describe an issue or paste credentials to update tools.'
          : 'Hi! Describe a production issue to start, or paste credentials first (e.g. repo: owner/name).';
        appendRow('agent', content);
      })();
    </script>
  </body>
</html>
